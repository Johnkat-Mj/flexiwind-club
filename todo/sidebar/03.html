<!DOCTYPE html>
<html lang="en" data-palette="" class="darek">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar 02</title>
  </head>

  <body class="bg-bg overflow-hidden lg:overflow-y-auto overflow-y-auto">
    <aside
      data-app-sidebar
      class="peer fixed h-dvh overflow-hidden w-11/12 max-w-84 md:w-84 origin-left scale-[.96] fx-open:scale-100 lg:scale-100 opacity-0 fx-open:opacity-100 invisible fx-open:visible lg:visible lg:opacity-100 transition-all duration-300 bg-bg border-r border-border-strong/70 flex lg:transition-none ease-linear z-80"
    >
      <nav
        class="w-16 p-3 border-r border-border bg-bg-subtle flex flex-col justify-between gap-5 items-center"
      >
        <div
          class="flex w-full pb-2 border-b border-b-gray-100 dark:border-b-gray-900"
        >
          <a
            href="#"
            class="bg-fg-title w-full aspect-square rounded-md flex items-center justify-center text-bg"
          >
            <span class="iconify ph--shopping-bag text-xl"></span>
          </a>
        </div>
        <ul class="flex flex-col w-full gap-4 flex-1 text-fg-muted">
          <li class="flex w-full">
            <a
              href="#"
              data-state="active"
              class="fx-active:bg-bg-muted fx-active:text-fg-title w-full flex items-center justify-center aspect-square rounded-md"
            >
              <span aria-hidden="true" class="iconify ph--stack text-lg"></span>
            </a>
          </li>
          <li class="flex w-full">
            <a
              href="#"
              data-state="inactive"
              class="fx-active:bg-bg-muted fx-active:text-fg-title w-full flex items-center justify-center aspect-square rounded-md"
            >
              <span
                aria-hidden="true"
                class="iconify ph--cash-register text-lg"
              ></span>
            </a>
          </li>
          <li class="flex w-full">
            <a
              href="#"
              data-state="inactive"
              class="fx-active:bg-bg-muted fx-active:text-fg-title w-full flex items-center justify-center aspect-square rounded-md"
            >
              <span
                aria-hidden="true"
                class="iconify ph--seal-percent text-lg"
              ></span>
            </a>
          </li>
          <li class="flex w-full">
            <a
              href="#"
              data-state="inactive"
              class="fx-active:bg-bg-muted fx-active:text-fg-title w-full flex items-center justify-center aspect-square rounded-md"
            >
              <span
                aria-hidden="true"
                class="iconify ph--gear-six text-lg"
              ></span>
            </a>
          </li>
          <li class="flex w-full">
            <a
              href="#"
              data-state="inactive"
              class="fx-active:bg-bg-muted fx-active:text-fg-title w-full flex items-center justify-center aspect-square rounded-md"
            >
              <span aria-hidden="true" class="iconify ph--bell text-lg"></span>
            </a>
          </li>
        </ul>
        <div class="flex">
          <button
            class="outline-none flex items-center justify-center aspect-square w-full"
          >
            <img
              class="size-full rounded-md object-cover"
              src="https://avatars.githubusercontent.com/u/34010260?v=4"
              width="200"
              height="200"
              alt="Tresor kasenda"
            />
          </button>
        </div>
      </nav>
      <div class="flex-1 p-4">
        <nav class="flex flex-col gap-4">
          <div class="">
            <button class="flex items-center justify-between w-full gap-3">
              <div class="flex-1 flex flex-col items-start text-left">
                <span class="text-sm font-medium text-fg-title line-clamp-1"
                  >Sky Studio</span
                >
                <span class="text-xs text-fg-muted line-clamp-1"
                  >Studio likasi</span
                >
              </div>
              <span class="iconify ph--caret-down text-fg-muted"></span>
            </button>
          </div>
          <div class="pb-3 border-b border-border">
            <form class="w-full relative">
              <input
                type="search"
                placeholder="Type something"
                class="w-full ui-form-base ui-form-input ui-form-input-md shadow border border-border-input rounded-md ps-9 text-sm text-fg"
              />
              <span
                class="iconify ph--magnifying-glass absolute left-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-xs text-fg-muted"
              ></span>
              <div
                class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none flex items-center gap-0.5 text-xs font-light"
              >
                <kbd
                  class="ui-subtle ui-subtle-gray size-5 d-flex-place-center rounded"
                  ><span class="iconify ph--command"></span
                ></kbd>
                <kbd
                  class="ui-subtle ui-subtle-gray size-5 d-flex-place-center rounded"
                  >k</kbd
                >
              </div>
            </form>
          </div>
          <ul class="flex flex-col gap-2 font-normal text-sm">
            <li>
              <a
                href="#"
                data-state="active"
                class="flex items-center gap-x-3 px-2.5 py-1.5 rounded-md text-fg-muted fx-active:text-fg-title fx-active:bg-bg-muted/70"
              >
                <span class="flex iconify ph--chart-pie-slice"></span>
                Overview
              </a>
            </li>
            <li>
              <a
                href="#"
                class="flex items-center gap-x-3 px-2.5 py-1.5 rounded-md text-fg-muted fx-active:text-fg-title fx-active:bg-bg-muted/70"
              >
                <span class="flex iconify ph--storefront"></span>
                Stores
              </a>
            </li>
            <li>
              <a
                href="#"
                class="flex items-center gap-x-3 px-2.5 py-1.5 rounded-md text-fg-muted fx-active:text-fg-title fx-active:bg-bg-muted/70"
              >
                <span class="flex iconify ph--barcode"></span>
                Products
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>

    <main
      class="overflow-hidden overflow-y-auto h-dvh lg:w-[calc(100vw---spacing(84))] lg:ml-auto peer-fx-open:translate-x-84 lg:peer-fx-open:translate-x-0 transition-transform duration-300 ease-linear lg:transition-none"
    >
      <header class="w-full flex h-16 sticky top-0 z-40 bg-bg">
        <div class="flex items-center justify-between w-full h-full px-4">
          <div class="flex items-center gap-3">
            <div
              class="flex lg:hidden pr-2 relative before:absolute before:inset-y-2 before:right-0 before:w-0.5 before:bg-border"
            >
              <button
                data-toggle-sidebar
                class="flex flex-col relative justify-center items-center"
              >
                <span class="iconify ph--door-open"></span>
              </button>
            </div>

            <div class=""></div>
          </div>
          <div class="flex items-center gap-2"></div>
        </div>
      </header>
      <div class="grid"></div>
    </main>
    <script type="module">
      import { actionToggler } from "@flexilla/utilities";

      actionToggler({
        trigger: "[data-toggle-sidebar]",
        targets: [
          {
            element: "[data-app-sidebar]",
            attributes: {
              initial: { "data-state": "close" },
              to: { "data-state": "open" },
            },
          },
        ],
        onToggle: ({ isExpanded }) => {
          document.body.classList[!isExpanded ? "add" : "remove"](
            "overflow-y-auto"
          );
        },
      });
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
