<!DOCTYPE html>
<html lang="en" data-palette="" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashblock 01</title>
  </head>

  <body class="bg-bg overflow-hidden lg:overflow-y-auto overflow-y-auto">
    <main class="py-20">
      <div class="max-w-2xl w-full px-4 mx-auto">
        <div
          class="bg-bg border border-border-strong/40 ring-2 ring-border rounded-lg"
        >
          <div class="p-6 border-b border-border bg-bg-surface">
            <h4 class="text-lg font-semibold text-fg-title">
              Two-Factor Authentication
            </h4>
            <p class="text-sm text-fg">
              Add an extra layer of security to your account
            </p>
          </div>
          <div class="p-6 grid gap-4">
            <div
              class="flex items-center justify-between p-4 border border-border-strong/60 rounded-lg"
            >
              <div class="space-y-1 flex-1">
                <h5 class="font-medium text-fg-title">
                  SMS Authentication
                </h5>
                <p class="text-sm text-fg-muted">
                  Receive verification codes via SMS
                </p>
              </div>
              <div class="flex items-center space-x-3">
                <span class="text-sm text-fg-muted">Enabled</span>
                <button
                  class="btn btn-sm btn-soft btn-soft-gray border border-border-strong/60 rounded-md"
                >
                  Configure
                </button>
              </div>
            </div>

            <div
              class="flex items-center justify-between p-4 border border-border-strong/60 rounded-lg"
            >
              <div class="space-y-1 flex-1">
                <h5 class="font-medium text-fg-title">
                  Authenticator App
                </h5>
                <p class="text-sm text-fg-muted">
                  Use an authenticator app for verification
                </p>
              </div>
              <div class="flex items-center space-x-3">
                <span class="text-sm text-fg-muted"
                  >Not configured</span
                >
                <button
                  class="btn btn-sm btn-solid btn-solid-primary text-white rounded-md"
                >
                  Setup
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
